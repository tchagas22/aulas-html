<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

</head>
<body>
    
<!--
    
    table -> tabela
    tr -> Table Row -> Linha da tabela
    td -> Table data ( dados da tabela) * table center (celulas da tabela)
    Th -> Table Header (cabeçalho da tabela)

    Nao utilizar border na tag, apenas para fins de estudo (vamos usar css)
-->

<table border="1">

<tr>

    <th>Produto</th>
    <th>Quantidade</th>
    <th>Preço</th>

</tr>

<tr>

    <td>Notbook</td>
    <td>2</td>
    <td>R$2000</td>

</tr>

<tr>

    <td>Tabket</td>
    <td>5</td>
    <td>R$1000</td>

</tr>   

    <!--
        Colspan -> extensão da coluna
        rowspan -> estensão da linha 
    -->

    <tr>

        <td>Desconto</td>
        <td colspan="2">R$20</td>
        
        
    </tr>
    
</table>

</body>
</html>
