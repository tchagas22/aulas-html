<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    

    <h1>Exercício de formulários</h1>
    <fieldset>
        <legend>Dados pessoais</legend>

        <label for="nome">Nome</label>
        <input type="nome" name="nome" id="nome"> <br><br>

        <label for="email">Email</label>
        <input type="text" name="email" id="email"> <br><br>

        <input type="checkbox" name="receber_email">
        <label"> Quero receber e-mail</label> <br><br>

    </fieldset>
       
    <fieldset>
        <legend>Informações adicionais</legend>

        <input type="radio" name="tipo" id="pf" value="PF">
        <label for="pf">Pessoa fisíca</label>

        <input type="radio" name="tipo" id="pj" value="PJ">
        <label for="pj">Pesoa Jurídica</label> <br>

    </fieldset>
<br> 
    <input type="submit" value="Cadastrar">

</body>
</html>
