<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style></style>

</head>
<body>
    
    <!--
    
        caption -> Legenda / titulo da tabela
        Thead -> table header - cabeçaljo da tabela 
        tbody -> Table body - corpo da tabela
        tfoot -> Table footer - rodapé da tabela

    -->

    <table border="3">

        <caption>Listagem de produto</caption>
        <thead>
            <tr>
                <th>Produto</th>
                <th>Quantidade</th>
                <th>Preço</th>

            </tr>
        </thead>

        <tbody>

            <tr>

                <td>Notbook</td>
                <td>2</td>
                <td>R$2000</td>

            </tr>

            <tr>

                <td>Tabket</td>
                <td>5</td>
                <td>R$1000</td>

            </tr>   

   
        </tbody>

        <tfoot>

            <tr>

                <td>Total</td>
                <td colspan="2">R$3000</td>
            </tr>

        </tfoot>

    </table>

</body>
</html>
